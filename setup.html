<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Partida · Cuatrola</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/setup.css">
</head>
<body>

<div class="setup-container">

  <a href="index.html" class="btn-volver">← Inicio</a>

  <h1 class="setup-titulo">Cuatrola</h1>
  <p class="setup-subtitulo">Elige tus rivales</p>

  <!-- ─── Mesa visual con 4 asientos ─── -->
  <div class="setup-mesa">

    <!-- Norte (compañero) -->
    <div class="asiento asiento-norte" data-pos="norte">
      <div class="avatar-ring" id="avatar-norte">
        <span class="avatar-inicial" id="inicial-norte">B</span>
        <img id="img-avatar-norte" class="avatar-img" src="" alt="" style="display:none">
      </div>
      <input class="asiento-nombre" id="nombre-norte" type="text"
             value="Jugador 2" maxlength="12" data-pos="norte" autocomplete="off">
      <span class="asiento-badge badge-bot">Bot IA</span>
      <span class="asiento-equipo equipo-a-txt">Equipo A</span>
    </div>

    <!-- Fila media: Oeste + Tapete + Este -->
    <div class="setup-fila-media">

      <!-- Oeste (rival) -->
      <div class="asiento asiento-oeste" data-pos="oeste">
        <div class="avatar-ring" id="avatar-oeste">
          <span class="avatar-inicial" id="inicial-oeste">B</span>
          <img id="img-avatar-oeste" class="avatar-img" src="" alt="" style="display:none">
        </div>
        <input class="asiento-nombre" id="nombre-oeste" type="text"
               value="Jugador 3" maxlength="12" data-pos="oeste" autocomplete="off">
        <span class="asiento-badge badge-bot">Bot IA</span>
        <span class="asiento-equipo equipo-b-txt">Equipo B</span>
      </div>

      <!-- Tapete circular -->
      <div class="setup-tapete">
        <div class="setup-tapete-inner">
          <span class="tapete-icono">⚔</span>
          <div class="setup-equipo-lineas">
            <div class="linea-equipo linea-a"></div>
            <div class="linea-equipo linea-b"></div>
          </div>
        </div>
      </div>

      <!-- Este (rival) -->
      <div class="asiento asiento-este" data-pos="este">
        <div class="avatar-ring" id="avatar-este">
          <span class="avatar-inicial" id="inicial-este">B</span>
          <img id="img-avatar-este" class="avatar-img" src="" alt="" style="display:none">
        </div>
        <input class="asiento-nombre" id="nombre-este" type="text"
               value="Jugador 4" maxlength="12" data-pos="este" autocomplete="off">
        <span class="asiento-badge badge-bot">Bot IA</span>
        <span class="asiento-equipo equipo-b-txt">Equipo B</span>
      </div>

    </div><!-- /fila-media -->

    <!-- Sur (tú) -->
    <div class="asiento asiento-sur" data-pos="sur">
      <div class="avatar-ring avatar-ring-tu avatar-ring-editable" id="avatar-sur" onclick="togglePicker()">
        <span class="avatar-inicial" id="inicial-sur">J</span>
        <img id="img-avatar-sur" class="avatar-img" src="" alt="" style="display:none">
        <span class="avatar-edit-hint">✎</span>
      </div>
      <input class="asiento-nombre asiento-nombre-tu" id="nombre-sur" type="text"
             value="Jugador 1" maxlength="12" autocomplete="off">
      <span class="asiento-badge badge-tu">Tú</span>
      <span class="asiento-equipo equipo-a-txt">Equipo A</span>
    </div>

    <!-- Selector de avatares (aparece al tocar el avatar de Sur) -->
    <div id="avatar-picker" class="avatar-picker" style="display:none">
      <p class="picker-titulo">Elige tu avatar</p>
      <div class="picker-grid" id="picker-grid"></div>
    </div>

  </div><!-- /setup-mesa -->

  <!-- Info equipos -->
  <div class="equipos-resumen">
    <div class="equipo-chip equipo-chip-a">
      <span class="equipo-dot dot-a"></span>
      <span>A: <strong id="label-sur">Jugador 1</strong> + <strong id="label-norte">Jugador 2</strong></span>
    </div>
    <span class="equipo-vs">vs</span>
    <div class="equipo-chip equipo-chip-b">
      <span class="equipo-dot dot-b"></span>
      <span>B: <strong id="label-este">Jugador 4</strong> + <strong id="label-oeste">Jugador 3</strong></span>
    </div>
  </div>

  <button class="btn-primario btn-jugar" id="btn-jugar">▶ Jugar</button>

</div><!-- /setup-container -->

<script src="js/audio.js"></script>
<script>
  // ─── Avatares ─────────────────────────────────────────────────────────────

  const AVATARES = [
    'IMG avatares/Avatar 1.png',
    'IMG avatares/Avatar 2.png',
    'IMG avatares/Avatar 3.png',
    'IMG avatares/Avatar 4.png',
    'IMG avatares/Avatar 5.png',
    'IMG avatares/Avatar 6.png',
  ];

  let avatarSurIdx = 0;
  // Rutas relativas de los avatares de los bots (no usar img.src, que devuelve URL absoluta)
  const botAvatarPaths = {};

  // Construir el grid del picker
  const pickerGrid = document.getElementById('picker-grid');
  AVATARES.forEach((src, i) => {
    const img = document.createElement('img');
    img.src       = src;
    img.className = 'picker-avatar';
    img.addEventListener('click', () => elegirAvatar(i));
    pickerGrid.appendChild(img);
  });

  function togglePicker() {
    const picker = document.getElementById('avatar-picker');
    picker.style.display = picker.style.display === 'none' ? 'flex' : 'none';
  }

  function elegirAvatar(idx) {
    avatarSurIdx = idx;

    // Mostrar en el anillo de Sur
    const img     = document.getElementById('img-avatar-sur');
    const inicial = document.getElementById('inicial-sur');
    img.src             = AVATARES[idx];
    img.style.display   = 'block';
    inicial.style.display = 'none';

    // Destacar el seleccionado en el picker
    pickerGrid.querySelectorAll('.picker-avatar').forEach((el, i) => {
      el.classList.toggle('picker-avatar-sel', i === idx);
    });

    // Re-asignar bots con los restantes
    asignarAvataresBots();

    // Cerrar picker
    document.getElementById('avatar-picker').style.display = 'none';
  }

  function asignarAvataresBots() {
    // Mezclar los avatares restantes y asignarlos a los 3 bots
    const restantes = AVATARES.filter((_, i) => i !== avatarSurIdx);
    for (let i = restantes.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [restantes[i], restantes[j]] = [restantes[j], restantes[i]];
    }
    ['norte', 'oeste', 'este'].forEach((pos, i) => {
      botAvatarPaths[pos] = restantes[i];   // guardar ruta relativa directamente
      const img     = document.getElementById(`img-avatar-${pos}`);
      const inicial = document.getElementById(`inicial-${pos}`);
      if (img) {
        img.src           = restantes[i];
        img.style.display = 'block';
      }
      if (inicial) inicial.style.display = 'none';
    });
  }

  // Asignar avatares al cargar la página
  asignarAvataresBots();
  // Mostrar el avatar guardado de Sur (si lo hay)
  const avatarGuardado = localStorage.getItem('cuatrola-avatar-sur');
  if (avatarGuardado !== null) {
    elegirAvatar(parseInt(avatarGuardado, 10));
  } else {
    elegirAvatar(0);
  }

  // ─── Nombres ──────────────────────────────────────────────────────────────

  function actualizarLabel(pos, valor) {
    const el = document.getElementById(`label-${pos}`);
    if (el) el.textContent = valor || `Jugador`;
  }

  const inputSur = document.getElementById('nombre-sur');
  inputSur.addEventListener('input', () => {
    actualizarLabel('sur', inputSur.value || 'Jugador 1');
  });

  ['norte', 'este', 'oeste'].forEach(pos => {
    const input = document.getElementById(`nombre-${pos}`);
    input.addEventListener('input', () => actualizarLabel(pos, input.value));
  });

  // Restaurar nombre guardado
  const nombreGuardado = localStorage.getItem('cuatrola-nombre-jugador');
  if (nombreGuardado) {
    inputSur.value = nombreGuardado;
    actualizarLabel('sur', nombreGuardado);
  }

  // ─── Audio ────────────────────────────────────────────────────────────────

  document.addEventListener('click',      audioGesto, { once: true });
  document.addEventListener('touchstart', audioGesto, { once: true });

  // ─── Ir a la partida ──────────────────────────────────────────────────────

  document.getElementById('btn-jugar').addEventListener('click', () => {
    const config = {
      jugadores: {
        sur:   { nombre: inputSur.value.trim() || 'Jugador 1', tipo: 'humano', avatar: AVATARES[avatarSurIdx] },
        norte: { nombre: document.getElementById('nombre-norte').value.trim() || 'Jugador 2', tipo: 'bot', avatar: botAvatarPaths['norte'] || null },
        este:  { nombre: document.getElementById('nombre-este').value.trim()  || 'Jugador 4', tipo: 'bot', avatar: botAvatarPaths['este']  || null },
        oeste: { nombre: document.getElementById('nombre-oeste').value.trim() || 'Jugador 3', tipo: 'bot', avatar: botAvatarPaths['oeste'] || null },
      }
    };

    localStorage.setItem('cuatrola-nombre-jugador', config.jugadores.sur.nombre);
    localStorage.setItem('cuatrola-avatar-sur', avatarSurIdx);

    sessionStorage.setItem('cuatrola4-config', JSON.stringify(config));
    location.href = 'game4.html';
  });
</script>

</body>
</html>
